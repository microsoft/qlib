qlib_init:
    provider_uri: "~/.qlib/qlib_data/cn_data"
    region: cn
market: &market csi300
benchmark: &benchmark SH000300

task:
    model:
        class: LinearModel
        module_path: qlib.contrib.model.linear
        kwargs:
            estimator: ols
    dataset:
        class: DatasetH
        module_path: qlib.data.dataset
        kwargs:
            handler:
                class: DataHandlerLP
                module_path: qlib.data.dataset.handler
                kwargs:
                    instruments: *market
                    start_time: 2017-01-01
                    end_time: 2020-08-01
                    data_loader:
                        class: QlibDataLoader
                        module_path: qlib.data.dataset.loader
                        kwargs:
                            config:
                                feature:
                                    - ["Mean($close, 5)/$close", "Mean($close, 20)/$close", "(Mean($close, 5) - Mean($close, 20))/$close", "If(Mean($close, 5) > Mean($close, 20), 1, -1)"]
                                    - ["MA5", "MA20", "MA_DIFF", "MA_SIGNAL"]
                                label:
                                    - ["Ref($close, -2)/Ref($close, -1) - 1"]
                                    - ["LABEL0"]
                            freq: day
                    infer_processors:
                        - class: RobustZScoreNorm
                          kwargs:
                              fit_start_time: 2017-01-01
                              fit_end_time: 2018-12-31
                              fields_group: feature
                              clip_outlier: true
                        - class: Fillna
                          kwargs:
                              fields_group: feature
                    learn_processors:
                        - class: DropnaLabel
                        - class: CSRankNorm
                          kwargs:
                              fields_group: label
            segments:
                train: [2017-01-01, 2018-12-31]
                valid: [2019-01-01, 2019-12-31]
                test: [2020-01-01, 2020-08-01]

port_analysis_config:
    strategy:
        class: TopkDropoutStrategy
        module_path: qlib.contrib.strategy
        kwargs:
            signal:
                - <MODEL>
                - <DATASET>
            topk: 100
            n_drop: 10
            risk_degree: 0.95
    backtest:
        start_time: 2017-01-01
        end_time: 2020-08-01
        account: 100000000
        benchmark: *benchmark
        exchange_kwargs:
            limit_threshold: 0.095
            deal_price: close
            open_cost: 0.0005
            close_cost: 0.0015
            min_cost: 5
