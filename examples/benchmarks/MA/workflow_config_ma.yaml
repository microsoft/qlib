qlib_init:
    provider_uri: "~/.qlib/qlib_data/cn_data"
    region: cn
market: &market csi300
benchmark: &benchmark SH000300
data_handler_config: &data_handler_config
    start_time: 2008-01-01
    end_time: 2020-08-01
    fit_start_time: 2008-01-01
    fit_end_time: 2014-12-31
    instruments: *market
    infer_processors:
        - class: RobustZScoreNorm
          kwargs:
              fields_group: feature
              clip_outlier: true
        - class: Fillna
          kwargs:
              fields_group: feature
    learn_processors:
        - class: DropnaLabel
        - class: CSRankNorm
          kwargs:
              fields_group: label
port_analysis_config: &port_analysis_config
    strategy:
        class: MAStrategy
        module_path: qlib.contrib.strategy.ma_strategy
        kwargs:
            signal:
                - <MODEL> 
                - <DATASET>
            risk_degree: 0.95
    backtest:
        start_time: 2017-01-01
        end_time: 2020-08-01
        account: 100000000
        benchmark: *benchmark
        exchange_kwargs:
            limit_threshold: 0.095
            deal_price: close
            open_cost: 0.0005
            close_cost: 0.0015
            min_cost: 5
task:
    model:
        class: LinearModel
        module_path: qlib.contrib.model.linear
        kwargs:
            estimator: ols
    dataset:
        class: DatasetH
        module_path: qlib.data.dataset
        kwargs:
            handler:
                class: MAHandler
                module_path: qlib.contrib.data.ma_handler
                kwargs:
                    instruments: *market
                    start_time: 2008-01-01
                    end_time: 2020-08-01
                    fit_start_time: 2008-01-01
                    fit_end_time: 2014-12-31
                    infer_processors:
                        - class: RobustZScoreNorm
                          kwargs:
                              fields_group: feature
                              clip_outlier: true
                        - class: Fillna
                          kwargs:
                              fields_group: feature
                    learn_processors:
                        - class: DropnaLabel
                        - class: CSRankNorm
                          kwargs:
                              fields_group: label
